<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings Tickers Today</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        .header .date {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
        }
        .table-container {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.85em;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
        }
        thead {
            display: table-header-group;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 10px 6px;
            text-align: left;
            white-space: nowrap;
            font-weight: bold;
            border-bottom: 2px solid #1a252f;
        }
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #e9ecef;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .time-bmo {
            background: #e8f5e8;
            color: #2d5a2d;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .time-amc {
            background: #fff3cd;
            color: #856404;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .time-tns {
            background: #d1ecf1;
            color: #0c5460;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin: 20px;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #0056b3;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #6c757d;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 1.1em;
        }
        .eps-beat {
            color: #28a745;
            font-weight: bold;
        }
        .eps-miss {
            color: #dc3545;
            font-weight: bold;
        }
        .eps-estimate {
            color: #6c757d;
            font-style: italic;
        }
        .revenue-beat {
            color: #28a745;
            font-weight: bold;
        }
        .revenue-miss {
            color: #dc3545;
            font-weight: bold;
        }
        .revenue-estimate {
            color: #6c757d;
            font-style: italic;
        }
        .null-value {
            color: #6c757d;
            font-style: italic;
        }
        .size-large {
            background: #d4edda;
            color: #155724;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
        }
        .size-mid {
            background: #fff3cd;
            color: #856404;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
        }
        .size-small {
            background: #f8d7da;
            color: #721c24;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
        }
        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .price-up {
            color: #28a745;
            font-weight: bold;
        }
        .price-down {
            color: #dc3545;
            font-weight: bold;
        }
        .price-neutral {
            color: #6c757d;
        }
        .market-cap-diff {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Earnings Tickers Today</h1>
            <div class="date" id="currentDate"></div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Celkovo</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="bmoCount">-</div>
                <div class="stat-label">BMO (Before Market)</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="amcCount">-</div>
                <div class="stat-label">AMC (After Market)</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="tnsCount">-</div>
                <div class="stat-label">TNS (Time Not Specified)</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadEarnings()">🔄 Obnoviť dáta</button>
        
        <div class="table-container">
            <div id="loading" class="loading">Načítavam dáta...</div>
            <div id="error" class="error" style="display: none;"></div>
            <table id="earningsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ticker</th>
                        <th>Čas reportovania</th>
                        <th>Market Cap</th>
                        <th>Diff</th>
                        <th>Size</th>
                        <th>Current Price</th>
                        <th>Price Change %</th>
                        <th>EPS Estimate</th>
                        <th>EPS Actual</th>
                        <th>Revenue Estimate</th>
                        <th>Revenue Actual</th>
                    </tr>
                </thead>
                <tbody id="earningsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Set current date
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('sk-SK', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        function formatCurrency(value) {
            if (value === null || value === undefined) return '-';
            if (value >= 1000000000) {
                return '$' + (value / 1000000000).toFixed(1) + 'B';
            } else if (value >= 1000000) {
                return '$' + (value / 1000000).toFixed(1) + 'M';
            } else if (value >= 1000) {
                return '$' + (value / 1000).toFixed(1) + 'K';
            }
            return '$' + value.toLocaleString();
        }

        function formatEPS(value) {
            if (value === null || value === undefined) return '-';
            return '$' + parseFloat(value).toFixed(2);
        }

        function formatPrice(value) {
            if (value === null || value === undefined) return '-';
            return '$' + parseFloat(value).toFixed(2);
        }

        function formatPriceChange(value) {
            if (value === null || value === undefined) return '-';
            const num = parseFloat(value);
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }

        function formatMarketCapDiff(value) {
            if (value === null || value === undefined || value === 0) return '-';
            const num = parseFloat(value);
            const sign = num >= 0 ? '+' : '';
            if (Math.abs(num) >= 1000000000) {
                return sign + (num / 1000000000).toFixed(1) + 'B';
            } else if (Math.abs(num) >= 1000000) {
                return sign + (num / 1000000).toFixed(1) + 'M';
            } else if (Math.abs(num) >= 1000) {
                return sign + (num / 1000).toFixed(1) + 'K';
            }
            return sign + num.toLocaleString();
        }

        function getEPSClass(actual, estimate) {
            if (actual === null || estimate === null) return 'null-value';
            if (actual > estimate) return 'eps-beat';
            if (actual < estimate) return 'eps-miss';
            return 'eps-estimate';
        }

        function getRevenueClass(actual, estimate) {
            if (actual === null || estimate === null) return 'null-value';
            if (actual > estimate) return 'revenue-beat';
            if (actual < estimate) return 'revenue-miss';
            return 'revenue-estimate';
        }

        function getPriceChangeClass(value) {
            if (value === null || value === undefined) return 'price-neutral';
            const num = parseFloat(value);
            if (num > 0) return 'price-up';
            if (num < 0) return 'price-down';
            return 'price-neutral';
        }

        function getSizeClass(size) {
            if (!size) return '';
            return `size-${size.toLowerCase()}`;
        }

        function getDiffClass(value) {
            if (value === null || value === undefined || value === 0) return '';
            const num = parseFloat(value);
            if (num > 0) return 'price-up';
            if (num < 0) return 'price-down';
            return '';
        }

        async function loadEarnings() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const table = document.getElementById('earningsTable');
            const tableBody = document.getElementById('earningsTableBody');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            table.style.display = 'none';
            
            try {
                const response = await fetch('api/earnings-tickers-today.php');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.message || 'Chyba pri načítaní dát');
                }
                
                // Update stats
                document.getElementById('totalCount').textContent = data.total || 0;
                
                // Count by time
                const bmoCount = data.data.filter(item => item.report_time === 'BMO').length;
                const amcCount = data.data.filter(item => item.report_time === 'AMC').length;
                const tnsCount = data.data.filter(item => item.report_time === 'TNS').length;
                
                document.getElementById('bmoCount').textContent = bmoCount;
                document.getElementById('amcCount').textContent = amcCount;
                document.getElementById('tnsCount').textContent = tnsCount;
                
                // Sort data by market cap DESC
                const sortedData = data.data.sort((a, b) => {
                    const marketCapA = parseFloat(a.market_cap) || 0;
                    const marketCapB = parseFloat(b.market_cap) || 0;
                    if (marketCapB !== marketCapA) return marketCapB - marketCapA; // DESC
                    return String(a.ticker || '').localeCompare(String(b.ticker || '')); // sekundárne podľa ticker
                });
                
                // Populate table
                tableBody.innerHTML = '';
                sortedData.forEach((item, index) => {
                    const row = document.createElement('tr');
                    const timeClass = `time-${item.report_time.toLowerCase()}`;
                    const epsActualClass = getEPSClass(item.eps_actual, item.eps_estimate);
                    const epsEstimateClass = item.eps_estimate !== null ? 'eps-estimate' : 'null-value';
                    const revenueActualClass = getRevenueClass(item.revenue_actual, item.revenue_estimate);
                    const revenueEstimateClass = item.revenue_estimate !== null ? 'revenue-estimate' : 'null-value';
                    const priceChangeClass = getPriceChangeClass(item.price_change_percent);
                    const sizeClass = getSizeClass(item.size);
                    
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td><strong>${item.ticker}</strong></td>
                        <td><span class="${timeClass}">${item.report_time}</span></td>
                        <td>${formatCurrency(item.market_cap)}</td>
                        <td class="market-cap-diff ${getDiffClass(item.market_cap_diff)}">${formatMarketCapDiff(item.market_cap_diff)}</td>
                        <td><span class="${sizeClass}">${item.size || '-'}</span></td>
                        <td>${formatPrice(item.current_price)}</td>
                        <td class="${priceChangeClass}">${formatPriceChange(item.price_change_percent)}</td>
                        <td class="${epsEstimateClass}">${formatEPS(item.eps_estimate)}</td>
                        <td class="${epsActualClass}">${formatEPS(item.eps_actual)}</td>
                        <td class="${revenueEstimateClass}">${formatCurrency(item.revenue_estimate)}</td>
                        <td class="${revenueActualClass}">${formatCurrency(item.revenue_actual)}</td>
                    `;
                    tableBody.appendChild(row);
                });
                
                loading.style.display = 'none';
                table.style.display = 'table';
                
                // Debug: Check if table header is visible
                console.log('Table displayed:', table.style.display);
                console.log('Table header:', table.querySelector('thead'));
                console.log('Table rows:', table.querySelectorAll('tbody tr').length);
                
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Chyba: ${err.message}`;
            }
        }

        // Load data on page load
        loadEarnings();
    </script>
    <!-- Cache buster: v3.0 -->
</body>
</html>
