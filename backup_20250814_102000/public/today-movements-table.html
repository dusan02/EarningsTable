<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today Earnings Movements - Market Cap Ranking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .table-container {
            overflow-x: auto;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        
        th {
            background: #2c3e50;
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th:first-child {
            border-top-left-radius: 8px;
        }
        
        th:last-child {
            border-top-right-radius: 8px;
        }
        
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e9ecef;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .ticker {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .company-name {
            color: #6c757d;
            font-size: 0.85em;
        }
        
        .price {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .positive {
            color: #28a745;
        }
        
        .negative {
            color: #dc3545;
        }
        
        .market-cap {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        
        .market-cap-diff {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        
        .size {
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .size-large {
            background: #dc3545;
            color: white;
        }
        
        .size-mid {
            background: #ffc107;
            color: #212529;
        }
        
        .size-small {
            background: #28a745;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #dc3545;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,123,255,0.4);
        }
        
        .rank {
            font-weight: bold;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Today Earnings Movements</h1>
            <p>Market Cap Ranking - Sorted by Market Cap DESC</p>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="total-count">-</div>
                <div class="stat-label">Total Companies</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-market-cap">-</div>
                <div class="stat-label">Total Market Cap</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="last-update">-</div>
                <div class="stat-label">Last Update</div>
            </div>
        </div>
        
        <div class="table-container">
            <div id="loading" class="loading">
                <h3>🔄 Loading data...</h3>
            </div>
            
            <div id="error" class="error" style="display: none;">
                <h3>❌ Error loading data</h3>
                <p id="error-message"></p>
            </div>
            
            <table id="data-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Ticker</th>
                        <th>Company</th>
                        <th>Current Price</th>
                        <th>Previous Close</th>
                        <th>Market Cap</th>
                        <th>Market Cap Diff (B$)</th>
                        <th>Size</th>
                        <th>Price Change %</th>
                        <th>Shares Outstanding</th>
                        <th>Updated</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()">
        🔄 Refresh
    </button>
    
    <script>
        function formatNumber(num) {
            if (num >= 1e12) {
                return (num / 1e12).toFixed(2) + 'T';
            } else if (num >= 1e9) {
                return (num / 1e9).toFixed(2) + 'B';
            } else if (num >= 1e6) {
                return (num / 1e6).toFixed(2) + 'M';
            } else if (num >= 1e3) {
                return (num / 1e3).toFixed(2) + 'K';
            }
            return num.toString();
        }
        
        function formatCurrency(num) {
            const isNegative = num < 0;
            const absNum = Math.abs(num);
            
            let formatted;
            if (absNum >= 1e12) {
                formatted = (absNum / 1e12).toFixed(2) + 'T';
            } else if (absNum >= 1e9) {
                formatted = (absNum / 1e9).toFixed(2) + 'B';
            } else if (absNum >= 1e6) {
                formatted = (absNum / 1e6).toFixed(2) + 'M';
            } else if (absNum >= 1e3) {
                formatted = (absNum / 1e3).toFixed(2) + 'K';
            } else {
                formatted = absNum.toString();
            }
            
            return (isNegative ? '-' : '') + '$' + formatted;
        }
        
        function formatPercent(num) {
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }
        
        function getSizeClass(size) {
            switch(size.toLowerCase()) {
                case 'large': return 'size-large';
                case 'mid': return 'size-mid';
                case 'small': return 'size-small';
                default: return 'size-small';
            }
        }
        
        function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('data-table').style.display = 'none';
            
            fetch('api/today-earnings-movements.php?t=' + Date.now())
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        displayData(data);
                    } else {
                        throw new Error(data.message || 'Unknown error');
                    }
                })
                .catch(error => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error-message').textContent = error.message;
                });
        }
        
        function displayData(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            let totalMarketCap = 0;
            
            // Sort data by market cap DESC
            const sortedData = data.data.sort((a, b) => {
                const marketCapA = parseInt(a.market_cap) || 0;
                const marketCapB = parseInt(b.market_cap) || 0;
                if (marketCapB !== marketCapA) return marketCapB - marketCapA; // DESC
                return String(a.ticker || '').localeCompare(String(b.ticker || '')); // sekundárne podľa ticker
            });
            
            sortedData.forEach((item, index) => {
                const row = document.createElement('tr');
                
                // Only add to total if market cap is valid
                const marketCap = parseInt(item.market_cap) || 0;
                if (marketCap > 0) {
                    totalMarketCap += marketCap;
                }
                
                const priceChangeClass = parseFloat(item.price_change_percent) >= 0 ? 'positive' : 'negative';
                const sizeClass = getSizeClass(item.size);
                const marketCapDiffClass = parseFloat(item.market_cap_diff_billions) >= 0 ? 'positive' : 'negative';
                
                // Handle missing or zero values
                const currentPrice = parseFloat(item.current_price) || 0;
                const previousClose = parseFloat(item.previous_close) || 0;
                const marketCapDiffBillions = parseFloat(item.market_cap_diff_billions) || 0;
                const priceChangePercent = parseFloat(item.price_change_percent) || 0;
                const sharesOutstanding = parseInt(item.shares_outstanding) || 0;
                
                // Determine if we have market data
                const hasMarketData = currentPrice > 0 && previousClose > 0;
                
                row.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td class="ticker">${item.ticker}</td>
                    <td class="company-name">${item.company_name}</td>
                    <td class="price">${hasMarketData ? '$' + currentPrice.toFixed(2) : 'N/A'}</td>
                    <td class="price">${hasMarketData ? '$' + previousClose.toFixed(2) : 'N/A'}</td>
                    <td class="market-cap">${marketCap > 0 ? formatCurrency(marketCap) : 'N/A'}</td>
                    <td class="market-cap-diff ${marketCapDiffClass}">${hasMarketData ? marketCapDiffBillions.toFixed(2) + 'B' : 'N/A'}</td>
                    <td class="size ${sizeClass}">${item.size}</td>
                    <td class="${priceChangeClass}">${hasMarketData ? formatPercent(priceChangePercent) : 'N/A'}</td>
                    <td class="market-cap">${sharesOutstanding > 0 ? formatNumber(sharesOutstanding) : 'N/A'}</td>
                    <td>${item.updated_at ? new Date(item.updated_at).toLocaleTimeString() : 'N/A'}</td>
                `;
                
                tbody.appendChild(row);
            });
            
            // Update stats
            document.getElementById('total-count').textContent = data.count;
            document.getElementById('total-market-cap').textContent = formatCurrency(totalMarketCap);
            document.getElementById('last-update').textContent = data.timestamp;
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('data-table').style.display = 'table';
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
