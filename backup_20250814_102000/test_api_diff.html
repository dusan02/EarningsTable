<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Diff Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .positive { color: green; }
        .negative { color: red; }
        .loading { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Diff Test</h1>
        <button onclick="testAPI()">Test API</button>
        <div id="loading" class="loading" style="display: none;">Loading...</div>
        <div id="results"></div>
    </div>

    <script>
        function formatMarketCapDiff(value) {
            if (value === null || value === undefined || value === 0) return '-';
            const num = parseFloat(value);
            const sign = num >= 0 ? '+' : '';
            if (Math.abs(num) >= 1000000000) {
                return sign + (num / 1000000000).toFixed(1) + 'B';
            } else if (Math.abs(num) >= 1000000) {
                return sign + (num / 1000000).toFixed(1) + 'M';
            } else if (Math.abs(num) >= 1000) {
                return sign + (num / 1000).toFixed(1) + 'K';
            }
            return sign + num.toLocaleString();
        }

        function getDiffClass(value) {
            if (value === null || value === undefined || value === 0) return '';
            const num = parseFloat(value);
            if (num > 0) return 'positive';
            if (num < 0) return 'negative';
            return '';
        }

        async function testAPI() {
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            loading.style.display = 'block';
            results.innerHTML = '';
            
            try {
                const response = await fetch('api/earnings-tickers-today.php');
                const data = await response.json();
                
                console.log('API Response:', data);
                
                if (data.error) {
                    throw new Error(data.message || 'Error loading data');
                }
                
                let html = '<h2>API Response Analysis</h2>';
                html += `<p>Total records: ${data.total}</p>`;
                html += `<p>Date: ${data.date}</p>`;
                
                // Check if market_cap_diff exists in the data
                const hasDiff = data.data.some(item => item.market_cap_diff !== undefined);
                html += `<p>Has market_cap_diff: ${hasDiff ? 'YES' : 'NO'}</p>`;
                
                // Show first 10 records with diff data
                html += '<h3>First 10 Records with Diff Data:</h3>';
                html += '<table>';
                html += '<tr><th>Ticker</th><th>Market Cap</th><th>Market Cap Diff</th><th>Market Cap Diff (B)</th><th>Current Price</th><th>Price Change %</th></tr>';
                
                data.data.slice(0, 10).forEach(item => {
                    const diffClass = getDiffClass(item.market_cap_diff);
                    html += `<tr>
                        <td><strong>${item.ticker}</strong></td>
                        <td>${item.market_cap ? '$' + (item.market_cap / 1000000000).toFixed(1) + 'B' : '-'}</td>
                        <td class="${diffClass}">${formatMarketCapDiff(item.market_cap_diff)}</td>
                        <td class="${diffClass}">${item.market_cap_diff_billions ? item.market_cap_diff_billions + 'B' : '-'}</td>
                        <td>${item.current_price ? '$' + parseFloat(item.current_price).toFixed(2) : '-'}</td>
                        <td>${item.price_change_percent ? parseFloat(item.price_change_percent).toFixed(2) + '%' : '-'}</td>
                    </tr>`;
                });
                
                html += '</table>';
                
                // Show raw data for debugging
                html += '<h3>Raw Data (First 3 records):</h3>';
                html += '<pre>' + JSON.stringify(data.data.slice(0, 3), null, 2) + '</pre>';
                
                results.innerHTML = html;
                
            } catch (err) {
                console.error('Error:', err);
                results.innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
