<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Sorting Simulation</title>
</head>
<body>
    <h1>JavaScript Sorting Simulation</h1>
    <div id="output"></div>
    
    <script>
        // Simulate the data from database
        const testData = [
            { ticker: 'RHE', revenue_estimate: null, revenue_actual: null },
            { ticker: 'YRD', revenue_estimate: null, revenue_actual: null },
            { ticker: 'BANX', revenue_estimate: null, revenue_actual: null },
            { ticker: 'ELLO', revenue_estimate: null, revenue_actual: null },
            { ticker: 'SRNN', revenue_estimate: null, revenue_actual: null },
            { ticker: 'BOSC', revenue_estimate: null, revenue_actual: 11530000 },
            { ticker: 'COE', revenue_estimate: null, revenue_actual: null },
            { ticker: 'YSG', revenue_estimate: null, revenue_actual: 1088917770 },
            { ticker: 'SNRE', revenue_estimate: null, revenue_actual: null },
            { ticker: 'KLDI', revenue_estimate: null, revenue_actual: null },
            { ticker: 'PLTYF', revenue_estimate: null, revenue_actual: null },
            { ticker: 'BRID', revenue_estimate: null, revenue_actual: null },
            { ticker: 'GRCU', revenue_estimate: null, revenue_actual: null },
            { ticker: 'BTO', revenue_estimate: null, revenue_actual: null },
            { ticker: 'KOSS', revenue_estimate: null, revenue_actual: null },
            { ticker: 'TWIN', revenue_estimate: 95166000, revenue_actual: 96680000 },
            { ticker: 'GOGL', revenue_estimate: 152592000, revenue_actual: null },
            { ticker: 'HOV', revenue_estimate: 809210990, revenue_actual: 800580000 },
            { ticker: 'SLQT', revenue_estimate: 340767975, revenue_actual: 345100000 },
            { ticker: 'ZM', revenue_estimate: 1234101885, revenue_actual: null },
            { ticker: 'CSIQ', revenue_estimate: 1986550255, revenue_actual: 1693870000 },
            { ticker: 'OSIS', revenue_estimate: 506345513, revenue_actual: 504990000 },
            { ticker: 'NMM', revenue_estimate: 312671760, revenue_actual: 296340000 },
            { ticker: 'BILI', revenue_estimate: 7473950672, revenue_actual: 7352732690 }
        ];

        function simulateSort(field, direction) {
            const sorted = [...testData].sort((a, b) => {
                let aVal, bVal;
                
                if (field === 'revenue_est') {
                    aVal = parseFloat(a.revenue_estimate);
                    bVal = parseFloat(b.revenue_estimate);
                    // Handle null/undefined values for revenue estimates
                    if (isNaN(aVal) && isNaN(bVal)) return 0;
                    if (isNaN(aVal)) return direction === 'asc' ? 1 : -1; // null values go to end
                    if (isNaN(bVal)) return direction === 'asc' ? -1 : 1; // null values go to end
                } else if (field === 'revenue_act') {
                    aVal = parseFloat(a.revenue_actual);
                    bVal = parseFloat(b.revenue_actual);
                    // Handle null/undefined values for revenue actuals
                    if (isNaN(aVal) && isNaN(bVal)) return 0;
                    if (isNaN(aVal)) return direction === 'asc' ? 1 : -1; // null values go to end
                    if (isNaN(bVal)) return direction === 'asc' ? -1 : 1; // null values go to end
                }
                
                if (direction === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });
            
            return sorted;
        }

        function displayResults(title, data) {
            const output = document.getElementById('output');
            output.innerHTML += `<h2>${title}</h2>`;
            output.innerHTML += '<table border="1" style="border-collapse: collapse; width: 100%;">';
            output.innerHTML += '<tr><th>Rank</th><th>Ticker</th><th>Revenue Est</th><th>Revenue Act</th><th>parseFloat(est)</th><th>parseFloat(act)</th></tr>';
            
            data.forEach((item, index) => {
                const estVal = parseFloat(item.revenue_estimate);
                const actVal = parseFloat(item.revenue_actual);
                output.innerHTML += `<tr>
                    <td>${index + 1}</td>
                    <td>${item.ticker}</td>
                    <td>${item.revenue_estimate}</td>
                    <td>${item.revenue_actual}</td>
                    <td>${estVal} (${typeof estVal})</td>
                    <td>${actVal} (${typeof actVal})</td>
                </tr>`;
            });
            output.innerHTML += '</table><br><br>';
        }

        // Test different sorting scenarios
        displayResults('Original Data (first 15)', testData.slice(0, 15));
        displayResults('Revenue Est ASC (first 15)', simulateSort('revenue_est', 'asc').slice(0, 15));
        displayResults('Revenue Act ASC (first 15)', simulateSort('revenue_act', 'asc').slice(0, 15));
    </script>
</body>
</html>
