<!DOCTYPE html>
<html>
<head>
    <title>Final Sorting Test</title>
</head>
<body>
    <h1>Final Sorting Test</h1>
    <div id="output"></div>
    
    <script>
        // Robust numeric comparison function with null handling
        function cmpNumericWithNullLast(a, b, direction, key) {
            const va = a[key];  // číslo alebo null
            const vb = b[key];

            if (va == null && vb == null) return 0;
            if (va == null) return 1;      // null na koniec
            if (vb == null) return -1;

            return direction === 'asc' ? va - vb : vb - va;
        }

        async function testSorting() {
            try {
                const response = await fetch('http://localhost:8080/api/earnings-tickers-today.php');
                const data = await response.json();
                
                console.log('=== FINAL SORTING TEST ===');
                console.log('Success:', data.success);
                console.log('Total records:', data.data.length);
                
                // Test sorting
                const testData = data.data.slice(0, 20); // First 20 records
                
                // Sort by revenue_estimate ASC
                const sortedASC = [...testData].sort((a, b) => cmpNumericWithNullLast(a, b, 'asc', 'revenue_estimate'));
                
                console.log('=== SORTED BY REVENUE_ESTIMATE ASC ===');
                sortedASC.forEach((item, index) => {
                    console.log(`${index + 1}. ${item.ticker}: ${item.revenue_estimate}`);
                });
                
                // Check if nulls are at the end
                const nullIndex = sortedASC.findIndex(item => item.revenue_estimate === null);
                console.log('First null at index:', nullIndex);
                
                // Display results
                let html = '<h2>Sorted by Revenue Estimate ASC</h2>';
                html += '<table border="1" style="border-collapse: collapse; width: 100%;">';
                html += '<tr><th>Rank</th><th>Ticker</th><th>Revenue Estimate</th><th>Revenue Actual</th><th>Type</th></tr>';
                
                sortedASC.forEach((item, index) => {
                    const est = item.revenue_estimate === null ? '-' : `$${(item.revenue_estimate / 1e6).toFixed(1)}M`;
                    const act = item.revenue_actual === null ? '-' : `$${(item.revenue_actual / 1e6).toFixed(1)}M`;
                    const type = item.revenue_estimate === null ? 'null' : typeof item.revenue_estimate;
                    html += `<tr><td>${index + 1}</td><td>${item.ticker}</td><td>${est}</td><td>${act}</td><td>${type}</td></tr>`;
                });
                
                html += '</table>';
                
                // Test revenue_actual sorting too
                const sortedActualASC = [...testData].sort((a, b) => cmpNumericWithNullLast(a, b, 'asc', 'revenue_actual'));
                
                html += '<h2>Sorted by Revenue Actual ASC</h2>';
                html += '<table border="1" style="border-collapse: collapse; width: 100%;">';
                html += '<tr><th>Rank</th><th>Ticker</th><th>Revenue Estimate</th><th>Revenue Actual</th><th>Type</th></tr>';
                
                sortedActualASC.forEach((item, index) => {
                    const est = item.revenue_estimate === null ? '-' : `$${(item.revenue_estimate / 1e6).toFixed(1)}M`;
                    const act = item.revenue_actual === null ? '-' : `$${(item.revenue_actual / 1e6).toFixed(1)}M`;
                    const type = item.revenue_actual === null ? 'null' : typeof item.revenue_actual;
                    html += `<tr><td>${index + 1}</td><td>${item.ticker}</td><td>${est}</td><td>${act}</td><td>${type}</td></tr>`;
                });
                
                html += '</table>';
                
                document.getElementById('output').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        testSorting();
    </script>
</body>
</html>
