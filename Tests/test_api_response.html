<!DOCTYPE html>
<html>
<head>
    <title>API Response Test</title>
</head>
<body>
    <h1>API Response Test</h1>
    <div id="output"></div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('api/earnings-tickers-today.php');
                const data = await response.json();
                
                console.log('=== API RESPONSE TEST ===');
                console.log('Total records:', data.data.length);
                
                // Check first few records
                for (let i = 0; i < Math.min(5, data.data.length); i++) {
                    const item = data.data[i];
                    console.log(`${item.ticker}:`);
                    console.log(`  revenue_estimate:`, item.revenue_estimate, `(type: ${typeof item.revenue_estimate})`);
                    console.log(`  revenue_actual:`, item.revenue_actual, `(type: ${typeof item.revenue_actual})`);
                }
                
                // Check null values
                const nullRecords = data.data.filter(item => item.revenue_estimate === null);
                console.log('Records with null revenue_estimate:', nullRecords.length);
                if (nullRecords.length > 0) {
                    console.log('Sample null record:', nullRecords[0]);
                }
                
                // Test sorting simulation
                const testData = data.data.slice(0, 10);
                console.log('=== SORTING TEST ===');
                
                const sorted = [...testData].sort((a, b) => {
                    const va = a.revenue_estimate;
                    const vb = b.revenue_estimate;
                    
                    console.log(`Comparing ${a.ticker}(${va}) vs ${b.ticker}(${vb})`);
                    
                    if (va == null && vb == null) return 0;
                    if (va == null) return 1;      // null na koniec
                    if (vb == null) return -1;
                    
                    return va - vb; // ASC
                });
                
                console.log('Sorted order (first 10):');
                sorted.forEach((item, index) => {
                    console.log(`${index + 1}. ${item.ticker}: ${item.revenue_estimate}`);
                });
                
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        testAPI();
    </script>
</body>
</html>
