<!DOCTYPE html>
<html>
<head>
    <title>Color Logic Test</title>
    <style>
        .price-up { color: #059669; font-weight: 600; }
        .price-down { color: #dc2626; font-weight: 600; }
        .price-neutral { color: #6b7280; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Color Logic Test</h1>
    <div id="output"></div>
    
    <script>
        function getPriceChangeClass(value) {
            if (value === null || value === undefined) return 'price-neutral';
            const num = parseFloat(value);
            if (isNaN(num)) return 'price-neutral';
            if (num > 0) return 'price-up';
            if (num < 0) return 'price-down';
            return 'price-neutral';
        }

        function getDiffClass(value) {
            if (value === null || value === undefined) return 'price-neutral';
            const num = parseFloat(value);
            if (isNaN(num)) return 'price-neutral';
            if (num > 0) return 'price-up';
            if (num < 0) return 'price-down';
            return 'price-neutral';
        }

        function getSurpriseClass(actual, estimate) {
            if (actual === null || estimate === null || actual === undefined || estimate === undefined) return 'price-neutral';
            const actualNum = parseFloat(actual);
            const estimateNum = parseFloat(estimate);
            if (isNaN(actualNum) || isNaN(estimateNum) || estimateNum === 0) return 'price-neutral';
            const surprise = ((actualNum - estimateNum) / Math.abs(estimateNum)) * 100;
            if (surprise > 0) return 'price-up';
            if (surprise < 0) return 'price-down';
            return 'price-neutral';
        }

        function formatSurprise(actual, estimate) {
            if (actual === null || estimate === null || actual === undefined || estimate === undefined) return '-';
            const actualNum = parseFloat(actual);
            const estimateNum = parseFloat(estimate);
            if (isNaN(actualNum) || isNaN(estimateNum) || estimateNum === 0) return '-';
            const surprise = ((actualNum - estimateNum) / Math.abs(estimateNum)) * 100;
            const sign = surprise >= 0 ? '+' : '';
            return sign + surprise.toFixed(2) + '%';
        }

        function formatPriceChange(value) {
            if (value === null || value === undefined) return '-';
            const num = parseFloat(value);
            if (isNaN(num)) return '-';
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }

        function formatMarketCapDiff(value) {
            if (value === null || value === undefined || value === 0) return '-';
            const num = parseFloat(value);
            if (isNaN(num)) return '-';
            
            const absNum = Math.abs(num);
            let formatted;
            
            if (absNum >= 1e12) formatted = `$${(absNum / 1e12).toFixed(1)}T`;
            else if (absNum >= 1e9) formatted = `$${(absNum / 1e9).toFixed(1)}B`;
            else if (absNum >= 1e6) formatted = `$${(absNum / 1e6).toFixed(1)}M`;
            else if (absNum >= 1e3) formatted = `$${(absNum / 1e3).toFixed(1)}K`;
            else formatted = `$${absNum.toFixed(0)}`;
            
            return num < 0 ? `-${formatted}` : formatted;
        }

        // Test data
        const testData = [
            { ticker: 'TEST1', price_change: 5.25, market_cap_diff: 1000000, eps_actual: 1.50, eps_estimate: 1.00, revenue_actual: 1000000, revenue_estimate: 900000 },
            { ticker: 'TEST2', price_change: -3.75, market_cap_diff: -500000, eps_actual: 0.80, eps_estimate: 1.00, revenue_actual: 800000, revenue_estimate: 900000 },
            { ticker: 'TEST3', price_change: 0, market_cap_diff: 0, eps_actual: 1.00, eps_estimate: 1.00, revenue_actual: 900000, revenue_estimate: 900000 },
            { ticker: 'TEST4', price_change: null, market_cap_diff: null, eps_actual: null, eps_estimate: 1.00, revenue_actual: null, revenue_estimate: 900000 }
        ];

        let html = '<h2>Color Logic Test Results</h2>';
        html += '<table>';
        html += '<tr><th>Ticker</th><th>Price Change</th><th>Market Cap Diff</th><th>EPS Surprise</th><th>Revenue Surprise</th></tr>';
        
        testData.forEach(item => {
            const priceClass = getPriceChangeClass(item.price_change);
            const diffClass = getDiffClass(item.market_cap_diff);
            const epsSurpriseClass = getSurpriseClass(item.eps_actual, item.eps_estimate);
            const revenueSurpriseClass = getSurpriseClass(item.revenue_actual, item.revenue_estimate);
            
            html += `<tr>
                <td>${item.ticker}</td>
                <td class="${priceClass}">${formatPriceChange(item.price_change)}</td>
                <td class="${diffClass}">${formatMarketCapDiff(item.market_cap_diff)}</td>
                <td class="${epsSurpriseClass}">${formatSurprise(item.eps_actual, item.eps_estimate)}</td>
                <td class="${revenueSurpriseClass}">${formatSurprise(item.revenue_actual, item.revenue_estimate)}</td>
            </tr>`;
        });
        
        html += '</table>';
        
        // Add explanation
        html += '<h3>Expected Colors:</h3>';
        html += '<ul>';
        html += '<li><span class="price-up">Green (price-up)</span>: Positive values, beats estimates</li>';
        html += '<li><span class="price-down">Red (price-down)</span>: Negative values, misses estimates</li>';
        html += '<li><span class="price-neutral">Gray (price-neutral)</span>: Zero values, null values, exact matches</li>';
        html += '</ul>';
        
        document.getElementById('output').innerHTML = html;
    </script>
</body>
</html>
