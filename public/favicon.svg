<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background square with rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  
  <!-- Calendar header -->
  <rect x="4" y="4" width="24" height="6" fill="#2563eb" rx="2"/>
  
  <!-- Calendar dots (representing days) -->
  <circle cx="8" cy="7" r="1" fill="#ffffff"/>
  <circle cx="12" cy="7" r="1" fill="#ffffff"/>
  <circle cx="16" cy="7" r="1" fill="#ffffff"/>
  <circle cx="20" cy="7" r="1" fill="#ffffff"/>
  <circle cx="24" cy="7" r="1" fill="#ffffff"/>
  
  <!-- Table grid lines -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="6" y1="16" x2="26" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="6" y1="24" x2="26" y2="24" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  
  <!-- Vertical table lines -->
  <line x1="10" y1="12" x2="10" y2="26" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="12" x2="16" y2="26" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="12" x2="22" y2="26" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  
  <!-- Earnings data cells (filled rectangles) -->
  <rect x="7" y="13" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="11" y="13" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="17" y="13" width="2" height="2" fill="#ef4444" opacity="0.9"/>
  <rect x="23" y="13" width="2" height="2" fill="#10b981" opacity="0.9"/>
  
  <rect x="7" y="17" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="11" y="17" width="2" height="2" fill="#ef4444" opacity="0.9"/>
  <rect x="17" y="17" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="23" y="17" width="2" height="2" fill="#10b981" opacity="0.9"/>
  
  <rect x="7" y="21" width="2" height="2" fill="#ef4444" opacity="0.9"/>
  <rect x="11" y="21" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="17" y="21" width="2" height="2" fill="#10b981" opacity="0.9"/>
  <rect x="23" y="21" width="2" height="2" fill="#ef4444" opacity="0.9"/>
  
  <!-- Dollar sign in top right -->
  <text x="26" y="8" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#ffffff" text-anchor="end">$</text>
  
  <!-- Alarm/notification dot -->
  <circle cx="26" cy="6" r="2" fill="#ef4444" opacity="0.8"/>
  <circle cx="26" cy="6" r="1" fill="#ffffff"/>
</svg>
